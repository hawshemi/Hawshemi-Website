    <body>
        <div class="container">
             <ul class="nav justify-content-center">
                <li class="nav-item">
                    <a class="nav-link" href="index.html">Home</a>
                </li>
                <li class="nav-item">

            <h1>Rasool Hashemi</h1>
            <h2>Contact Me</h2>
            <br>
            <form class="form" onsubmit="sendMessage(); return false;">
                <div class="alert alert-danger">
                    <button type="button" class="btn btn-danger" onclick="hide()">&times;</button>
                    Please fill all the fileds.
                </div>
                <div class="form-group">
                    <label for="name" class="form-label">Name:</label>
                    <input type="text" class="form-control" placeholder="Name" id="name">
                </div>
                <br>
                <div class="form-group">
                    <label for="email" class="form-label">Email:</label>
                    <input type="email" class="form-control" placeholder="Email" id="email">
                </div>
                <br>
                <div class="form-group">
                    <label for="message" class="form-label">Message:</label>
                    <textarea class="form-control" row="3" id="message" placeholder="Message"></textarea>
                </div>
                <br>
                <button type="submit" class="btn btn-dark btn-lg">Send</button>
            </form>
            <footer class="footer text-muted">
                By <a href="https://hawshemi.com/" target="_blank">Hawshemi</a>
            </footer>
        </div>
    </body>
